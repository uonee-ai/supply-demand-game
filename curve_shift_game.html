<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>시장 가격 탐정 - 수요·공급 곡선 이동 게임</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Do+Hyeon&family=IBM+Plex+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0E1420; --panel:#17202F; --panel2:#1E2A3D; --line:#2B3A52;
    --ink:#F2F0E9; --dim:#93A3BC;
    --demand:#FFA94D; --supply:#4DD4AC; --gold:#FFD166;
    --up:#FF6B6B; --down:#5C9DFF;
    --ok:#4DD4AC; --bad:#FF6B6B;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{
    background:var(--bg); color:var(--ink);
    font-family:'IBM Plex Sans KR',sans-serif;
    min-height:100vh; display:flex; justify-content:center;
    background-image:radial-gradient(circle at 20% 0%, #16233A 0%, var(--bg) 55%);
  }
  .wrap{width:100%; max-width:860px; padding:16px 14px 40px;}
  h1,h2,.dh{font-family:'Do Hyeon',sans-serif; font-weight:400; letter-spacing:.02em;}

  /* ── 상단 전광판 ── */
  .board{
    display:flex; justify-content:space-between; align-items:center;
    background:var(--panel); border:1px solid var(--line); border-radius:14px;
    padding:10px 16px; margin-bottom:14px;
  }
  .board h1{font-size:1.25rem; color:var(--gold);}
  .board .stats{display:flex; gap:14px; font-size:.9rem;}
  .board .stats b{font-family:'Do Hyeon'; font-size:1.1rem; color:var(--ink); margin-left:4px;}
  .streak-on{color:var(--gold);}

  .screen{display:none;} .screen.active{display:block;}

  /* ── 시작 화면 ── */
  .hero{
    background:var(--panel); border:1px solid var(--line); border-radius:18px;
    padding:34px 24px; text-align:center;
  }
  .hero h2{font-size:2rem; color:var(--gold); margin-bottom:6px;}
  .hero .sub{color:var(--dim); margin-bottom:22px; line-height:1.6; font-size:.95rem;}
  .rules{
    text-align:left; background:var(--panel2); border-radius:12px;
    padding:16px 18px; margin:0 auto 24px; max-width:560px;
    font-size:.92rem; line-height:1.8; color:var(--ink);
  }
  .rules .tag{display:inline-block; font-family:'Do Hyeon'; color:var(--bg);
    background:var(--gold); border-radius:6px; padding:0 8px; margin-right:8px; font-size:.85rem;}
  .mode-btns{display:flex; gap:12px; justify-content:center; flex-wrap:wrap;}
  .mode-btn{
    font-family:'Do Hyeon'; font-size:1.15rem; cursor:pointer;
    background:var(--panel2); color:var(--ink);
    border:2px solid var(--line); border-radius:14px; padding:16px 26px;
    transition:transform .12s, border-color .12s;
  }
  .mode-btn small{display:block; font-family:'IBM Plex Sans KR'; font-size:.78rem; color:var(--dim); margin-top:4px;}
  .mode-btn:hover{transform:translateY(-2px);}
  .mode-btn.basic{border-color:var(--supply);}
  .mode-btn.hard{border-color:var(--demand);}

  /* ── 게임 화면 ── */
  .scenario{
    background:var(--panel); border:1px solid var(--line); border-radius:14px;
    padding:14px 16px; margin-bottom:12px;
  }
  .scenario .market{
    display:inline-block; font-family:'Do Hyeon'; font-size:.9rem;
    color:var(--bg); background:var(--gold); border-radius:6px; padding:1px 10px; margin-bottom:8px;
  }
  .scenario p{font-size:1.02rem; line-height:1.65;}
  .qnum{color:var(--dim); font-size:.82rem; float:right;}

  .stage{
    display:grid; grid-template-columns:minmax(0,1fr) minmax(0,1fr); gap:12px; align-items:start;
  }
  @media(max-width:680px){ .stage{grid-template-columns:1fr;} }

  .graph-card{
    background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:10px;
  }
  svg{width:100%; height:auto; display:block;}
  .shiftable{transition:transform 1s cubic-bezier(.4,0,.2,1);}
  .fade{transition:opacity .5s;}

  .qa-card{
    background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:14px 14px 16px;
  }
  .qa-card .qtitle{font-family:'Do Hyeon'; font-size:1.05rem; margin-bottom:10px; color:var(--gold);}
  .opts{display:grid; gap:8px;}
  .opt{
    text-align:left; cursor:pointer; font-family:'IBM Plex Sans KR'; font-size:.95rem;
    background:var(--panel2); color:var(--ink);
    border:2px solid var(--line); border-radius:10px; padding:11px 13px;
    transition:border-color .12s, background .12s;
  }
  .opt:hover{border-color:var(--dim);}
  .opt:disabled{cursor:default; opacity:.85;}
  .opt.correct{border-color:var(--ok); background:rgba(77,212,172,.13);}
  .opt.wrong{border-color:var(--bad); background:rgba(255,107,107,.13);}
  .opt .arrow{font-family:'Do Hyeon'; margin-right:6px;}
  .opt .arrow.d{color:var(--demand);} .opt .arrow.s{color:var(--supply);}

  .feedback{
    margin-top:12px; border-radius:10px; padding:11px 13px;
    font-size:.9rem; line-height:1.65; display:none;
  }
  .feedback.show{display:block;}
  .feedback.good{background:rgba(77,212,172,.12); border:1px solid var(--ok);}
  .feedback.miss{background:rgba(255,107,107,.1); border:1px solid var(--bad);}
  .feedback .fb-title{font-family:'Do Hyeon'; margin-bottom:4px;}
  .feedback .factor{display:inline-block; margin-top:6px; font-size:.8rem; color:var(--bg);
    background:var(--dim); border-radius:6px; padding:1px 8px;}

  .next-btn{
    display:none; margin-top:12px; width:100%;
    font-family:'Do Hyeon'; font-size:1.1rem; cursor:pointer;
    background:var(--gold); color:#1a1408; border:none; border-radius:10px; padding:12px;
  }
  .next-btn.show{display:block;}

  .result-badges{display:none; gap:10px; margin-top:10px; justify-content:center;}
  .result-badges.show{display:flex;}
  .badge{
    font-family:'Do Hyeon'; font-size:1rem; border-radius:10px; padding:8px 16px;
    background:var(--panel2); border:1px solid var(--line);
  }
  .badge.up{color:var(--up); border-color:var(--up);}
  .badge.down{color:var(--down); border-color:var(--down);}

  /* ── 결과 화면 ── */
  .final{
    background:var(--panel); border:1px solid var(--line); border-radius:18px;
    padding:34px 22px; text-align:center;
  }
  .final .title{font-family:'Do Hyeon'; font-size:2rem; color:var(--gold); margin:8px 0 2px;}
  .final .score{font-family:'Do Hyeon'; font-size:3.2rem;}
  .final .of{color:var(--dim); font-size:1rem;}
  .final .msg{color:var(--dim); margin:10px 0 20px; line-height:1.7; font-size:.95rem;}
  .review{
    text-align:left; max-width:600px; margin:0 auto 22px;
    background:var(--panel2); border-radius:12px; padding:14px 16px;
    font-size:.88rem; line-height:1.7; max-height:260px; overflow-y:auto;
  }
  .review .rv{padding:6px 0; border-bottom:1px dashed var(--line);}
  .review .rv:last-child{border-bottom:none;}
  .review .ok{color:var(--ok); font-family:'Do Hyeon'; margin-right:6px;}
  .review .no{color:var(--bad); font-family:'Do Hyeon'; margin-right:6px;}
</style>
</head>
<body>
<div class="wrap">

  <div class="board">
    <h1>📈 시장 가격 탐정</h1>
    <div class="stats">
      <span>문제<b id="hud-round">-</b></span>
      <span>점수<b id="hud-score">0</b></span>
      <span>연속<b id="hud-streak">0</b></span>
    </div>
  </div>

  <!-- 시작 화면 -->
  <section class="screen active" id="scr-start">
    <div class="hero">
      <h2>수요·공급 곡선 이동 게임</h2>
      <p class="sub">시장에서 벌어진 사례를 읽고, 곡선의 이동과 가격 변화를 추리하라!</p>
      <div class="rules">
        <div><span class="tag">1단계</span>사례를 읽고 수요·공급에 영향을 준 <b>변동 요인</b>을 찾는다 (+10점)</div>
        <div><span class="tag">2단계</span><b>어느 곡선</b>이 <b>어느 방향</b>으로 이동하는지 고른다 (+10점)</div>
        <div><span class="tag">3단계</span>새로운 균형점에서 <b>가격</b>과 <b>거래량</b>이 어떻게 변하는지 고른다 (+10점)</div>
        <div><span class="tag">보너스</span>세 단계를 모두 맞히면 문제마다 +5점! (심화 모드의 '이동 없음' 함정을 간파하면 2단계에서 +20점)</div>
      </div>
      <div class="mode-btns">
        <button class="mode-btn basic" onclick="startGame('basic')">기본 모드<small>곡선 이동 4지선다 · 15문제</small></button>
        <button class="mode-btn hard" onclick="startGame('hard')">심화 모드<small>곡선 이름이 ㉠·㉡으로 숨겨짐 + '이동 없음' 함정 · 15문제</small></button>
      </div>
    </div>
  </section>

  <!-- 게임 화면 -->
  <section class="screen" id="scr-game">
    <div class="scenario">
      <span class="qnum" id="qnum"></span>
      <span class="market" id="market"></span>
      <p id="scenario-text"></p>
    </div>
    <div class="stage">
      <div class="graph-card">
        <svg id="graph" viewBox="0 0 420 330" xmlns="http://www.w3.org/2000/svg" aria-label="수요 공급 그래프">
          <defs>
            <clipPath id="plot-area"><rect x="55" y="15" width="330" height="270"/></clipPath>
          </defs>
          <!-- 축 -->
          <line x1="55" y1="285" x2="385" y2="285" stroke="#93A3BC" stroke-width="2"/>
          <line x1="55" y1="285" x2="55" y2="15" stroke="#93A3BC" stroke-width="2"/>
          <polygon points="385,285 376,280 376,290" fill="#93A3BC"/>
          <polygon points="55,15 50,24 60,24" fill="#93A3BC"/>
          <text x="30" y="30" fill="#93A3BC" font-size="14" font-family="IBM Plex Sans KR">가격</text>
          <text x="330" y="312" fill="#93A3BC" font-size="14" font-family="IBM Plex Sans KR">거래량</text>
          <!-- 가이드 라인 (결과 표시용) -->
          <g id="guides" class="fade" opacity="0">
            <line id="g-p0h" stroke="#93A3BC" stroke-width="1" stroke-dasharray="3 4"/>
            <line id="g-q0v" stroke="#93A3BC" stroke-width="1" stroke-dasharray="3 4"/>
            <line id="g-p1h" stroke="#FFD166" stroke-width="1" stroke-dasharray="3 4"/>
            <line id="g-q1v" stroke="#FFD166" stroke-width="1" stroke-dasharray="3 4"/>
            <text id="g-p0t" fill="#93A3BC" font-size="12" text-anchor="end">P₀</text>
            <text id="g-p1t" fill="#FFD166" font-size="12" text-anchor="end">P₁</text>
            <text id="g-q0t" fill="#93A3BC" font-size="12" text-anchor="middle">Q₀</text>
            <text id="g-q1t" fill="#FFD166" font-size="12" text-anchor="middle">Q₁</text>
          </g>
          <!-- 원래 곡선의 잔상 -->
          <line id="ghost" class="fade" opacity="0" stroke-width="2" stroke-dasharray="6 6"/>
          <!-- 곡선 (고정된 바깥 그룹에 클리핑 → 이동해도 축을 넘지 않음) -->
          <g clip-path="url(#plot-area)">
            <g id="demand-g" class="shiftable">
              <line x1="80" y1="70" x2="320" y2="250" stroke="#FFA94D" stroke-width="3.5" stroke-linecap="round"/>
            </g>
            <g id="supply-g" class="shiftable">
              <line x1="80" y1="250" x2="320" y2="70" stroke="#4DD4AC" stroke-width="3.5" stroke-linecap="round"/>
            </g>
          </g>
          <!-- 곡선 이름표 (곡선을 따라 이동) -->
          <text id="d-label" class="shiftable" x="320" y="270" text-anchor="middle" fill="#FFA94D" font-size="15" font-family="Do Hyeon">수요 D</text>
          <text id="s-label" class="shiftable" x="320" y="60" text-anchor="middle" fill="#4DD4AC" font-size="15" font-family="Do Hyeon">공급 S</text>
          <!-- 균형점 -->
          <circle id="e0" cx="200" cy="160" r="6" fill="#FFD166"/>
          <text id="e0t" x="210" y="152" fill="#FFD166" font-size="13" font-family="Do Hyeon">E₀</text>
          <circle id="e1" class="fade" opacity="0" r="6" fill="#FFD166" stroke="#0E1420" stroke-width="1.5"/>
          <text id="e1t" class="fade" opacity="0" fill="#FFD166" font-size="13" font-family="Do Hyeon">E₁</text>
        </svg>
        <div class="result-badges" id="badges">
          <span class="badge" id="badge-p"></span>
          <span class="badge" id="badge-q"></span>
        </div>
      </div>
      <div class="qa-card">
        <div class="qtitle" id="qtitle"></div>
        <div class="opts" id="opts"></div>
        <div class="feedback" id="feedback"></div>
        <button class="next-btn" id="next-btn" onclick="nextStep()">다음 ▶</button>
      </div>
    </div>
  </section>

  <!-- 결과 화면 -->
  <section class="screen" id="scr-end">
    <div class="final">
      <div class="dh" style="font-size:1rem;color:var(--dim)">최종 결과</div>
      <div class="title" id="final-title"></div>
      <div><span class="score" id="final-score"></span><span class="of"> / 525점</span></div>
      <p class="msg" id="final-msg"></p>
      <div class="review" id="review"></div>
      <div class="mode-btns">
        <button class="mode-btn basic" onclick="location.reload()">처음으로</button>
      </div>
    </div>
  </section>

</div>
<script>
/* ─────────── 시나리오 데이터 ───────────
   curve: 'D'(수요) | 'S'(공급) | 'N'(이동 없음, 심화 전용)
   dir: 'R'(오른쪽) | 'L'(왼쪽)
   factor: 변동 요인 라벨 / why: 해설
   ※ 기본 모드와 심화 모드는 서로 다른 사례를 사용 (겹침 없음) */

/* ── 기본 모드 전용 15문제 ── */
const SCENARIOS_BASIC = [
  // 수요 증가 (오른쪽)
  {market:'아이스크림 시장', text:'기록적인 폭염이 이어지면서 시원한 아이스크림을 찾는 사람이 크게 늘었다.',
   curve:'D', dir:'R', factor:'소비자의 기호 변화',
   why:'날씨 때문에 아이스크림에 대한 선호(기호)가 커졌어요. 같은 가격에서도 더 많이 사려고 하므로 수요 곡선 전체가 오른쪽으로 이동합니다.'},
  {market:'소고기 시장', text:'경기가 좋아져 국민들의 소득이 전반적으로 늘자, 소고기 외식을 즐기려는 사람이 많아졌다.',
   curve:'D', dir:'R', factor:'소득의 증가',
   why:'소득이 늘면 같은 가격에서도 살 수 있는 여유가 커져 수요가 증가합니다. 수요 곡선이 오른쪽으로 이동해요.'},
  {market:'닭고기 시장', text:'돼지고기 가격이 크게 오르자, 사람들이 대신 닭고기를 찾기 시작했다.',
   curve:'D', dir:'R', factor:'대체재(돼지고기) 가격 상승',
   why:'돼지고기와 닭고기는 서로 대신 쓸 수 있는 대체재! 돼지고기가 비싸지면 닭고기의 수요가 증가하여 수요 곡선이 오른쪽으로 이동합니다.'},
  {market:'잉크 카트리지 시장', text:'프린터 가격이 절반 수준으로 내리자, 잉크 카트리지를 찾는 사람이 늘었다.',
   curve:'D', dir:'R', factor:'보완재(프린터) 가격 하락',
   why:'프린터와 잉크는 함께 써야 하는 보완재예요. 프린터가 싸져 많이 팔리면 잉크의 수요도 함께 증가합니다.'},
  {market:'라면 시장', text:'"다음 달부터 라면 가격이 오른다"는 소식이 전해지자, 소비자들이 미리 라면을 사 두려고 한다.',
   curve:'D', dir:'R', factor:'미래 가격 상승 예상',
   why:'가격이 오르기 전에 사 두려는 심리! 미래에 가격이 오를 것으로 예상되면 현재의 수요가 증가합니다.'},
  // 수요 감소 (왼쪽)
  {market:'지하철 시장', text:'버스 요금이 크게 내리자, 지하철을 이용하려는 사람이 줄었다.',
   curve:'D', dir:'L', factor:'대체재(버스) 가격 하락',
   why:'버스와 지하철은 대체재 관계예요. 버스가 싸지면 지하철 수요는 감소하여 곡선이 왼쪽으로 이동합니다.'},
  {market:'장난감 시장', text:'저출산으로 아동 인구가 계속 줄면서, 장난감을 찾는 소비자가 감소했다.',
   curve:'D', dir:'L', factor:'수요자(인구) 수 감소',
   why:'수요자의 수가 줄면 시장 전체의 수요가 감소하여 수요 곡선이 왼쪽으로 이동합니다.'},
  {market:'겨울 코트 시장', text:'유난히 따뜻한 겨울이 이어지자, 두꺼운 겨울 코트를 찾는 사람이 줄었다.',
   curve:'D', dir:'L', factor:'소비자의 기호 변화(따뜻한 날씨)',
   why:'날씨 때문에 두꺼운 코트에 대한 선호가 줄었어요. 코트 가격이 변한 게 아닌데도 덜 사려고 하니 수요 곡선이 왼쪽으로 이동합니다.'},
  // 공급 증가 (오른쪽)
  {market:'빵 시장', text:'국제 밀 가격이 크게 내려 빵을 만드는 비용이 줄었다.',
   curve:'S', dir:'R', factor:'원자재(생산 요소) 가격 하락',
   why:'생산 비용이 줄면 같은 가격에서도 더 많이 만들어 팔 수 있어요. 공급이 증가하여 곡선이 오른쪽으로 이동합니다.'},
  {market:'의류 시장', text:'자동화 생산 기술이 도입되어 같은 비용으로 두 배 많은 옷을 만들 수 있게 되었다.',
   curve:'S', dir:'R', factor:'생산 기술의 발전',
   why:'기술이 발전하면 생산성이 높아져 공급이 증가합니다. 공급 곡선이 오른쪽으로 이동해요.'},
  {market:'치킨 시장', text:'치킨 장사가 잘된다는 소문이 퍼지자, 새로 문을 여는 치킨집이 크게 늘었다.',
   curve:'S', dir:'R', factor:'공급자 수 증가',

/* ─────────── 그래프 좌표 계산 ───────────
   화면 좌표: D는 y=0.75x+10, S는 y=-0.75x+310, 초기 균형 (200,160), 이동폭 dx=60 */
const DX = 60;
function newEq(curve, dir){
  const dx = (dir==='R'? DX : -DX);
  const x = 200 + 0.5*dx;
  const y = (curve==='D') ? 160 - 0.375*dx : 160 + 0.375*dx;
  return {x, y, dx};
}

const FCATS = {
  fTaste :'소비자의 기호(선호) 변화',

  fInput :'생산 요소(원자재·임금) 가격의 변화',
  fTech  :'생산 기술의 변화',

};
function fcatOf(sc){
  const f=sc.factor;
  if(f.includes('량의 변화')) return 'fPrice';
  if(f.includes('기호'))   return 'fTaste';
  if(f.includes('소득'))   return 'fIncome';
  if(f.includes('대체재')) return 'fSub';
  if(f.includes('보완재')) return 'fComp';
  if(f.includes('미래'))   return sc.curve==='D' ? 'fExpD' : 'fExpS';
  if(f.includes('수요자')) return 'fPop';
  if(f.includes('원자재')||f.includes('임금')) return 'fInput';
  if(f.includes('기술'))   return 'fTech';
  if(f.includes('공급자')) return 'fProd';
  return 'fNature';
}

function hud(){
  document.getElementById('hud-round').textContent = round+1 + '/' + ROUNDS;

  const st = document.getElementById('hud-streak');
  st.textContent = streak + (streak>=3?'🔥':'');
  st.classList.toggle('streak-on', streak>=3);
}

function resetGraph(){
  const els = ['demand-g','supply-g','d-label','s-label'].map(id=>document.getElementById(id));
  els.forEach(el=>{ el.style.transition='none'; el.style.transform='translateX(0)'; });
  void els[0].offsetWidth; // reflow
  els.forEach(el=>{ el.style.transition=''; });
  ['ghost','e1','e1t','guides'].forEach(id=>document.getElementById(id).setAttribute('opacity','0'));
  document.getElementById('badges').classList.remove('show');
}

function loadRound(){
  phase=1; fok=false; sok=false; cur=deck[round];

  document.getElementById('qnum').textContent = `문제 ${round+1} / ${ROUNDS}`;

  document.getElementById('scenario-text').textContent = cur.text;

  document.getElementById('next-btn').classList.remove('show');
  renderF();
}

  let distractors;
  if(ck==='fSub' || ck==='fComp'){
    // 대체재·보완재가 정답이면 반드시 둘 다 선택지에 등장
    const pair = ck==='fSub' ? 'fComp' : 'fSub';
    distractors = [pair, ...shuffle(pool.filter(k=>k!==pair)).slice(0,2)];
  }else{
    distractors = shuffle(pool).slice(0,3);
  }
  const opts = shuffle([ck, ...distractors]);
  const box=document.getElementById('opts'); box.innerHTML='';
  opts.forEach(k=>{
    const b=document.createElement('button'); b.className='opt';
    b.innerHTML=`<span class="arrow">🔍</span> ${FCATS[k]}`;
    b.onclick=()=>answerF(k, ck, b); box.appendChild(b);
  });
}

function answerF(key, ck, btn){
  fok = key===ck;
  document.querySelectorAll('.opt').forEach(b=>b.disabled=true);
  btn.classList.add(fok?'correct':'wrong');
  if(!fok) document.querySelectorAll('.opt').forEach(b=>{ if(b.textContent.includes(FCATS[ck])) b.classList.add('correct'); });
  if(fok) score+=10;
  hud();
  const fb=document.getElementById('feedback');
  fb.className='feedback show ' + (fok?'good':'miss');
  fb.innerHTML = `<div class="fb-title">${fok?'✅ 정답! +10점':'❌ 아쉬워요!'}</div>이 사례의 핵심 요인은 <b>「${FCATS[ck]}」</b>! 그렇다면 이 요인은 그래프를 어떻게 움직일까요?`;
  log.push({round:round+1, market:cur.market, f:fok});
  const nb=document.getElementById('next-btn');
  nb.textContent='2단계로 ▶'; nb.classList.add('show');
}

/* ─── 2단계: 곡선 이동 ─── */
function renderQ1(){
  phase=2;
  document.getElementById('feedback').className='feedback';
  document.getElementById('next-btn').classList.remove('show');
  document.getElementById('qtitle').textContent = window.MODE==='hard'
    ? '2단계 · 그래프의 ㉠·㉡ 중 어느 곡선이 움직일까?'
    : '2단계 · 그래프는 어떻게 될까?';
  let opts;
  if(window.MODE==='hard'){
    const lblToCurve = l => (LB.D===l ? 'D' : 'S');
    opts=[];
    ['㉠','㉡'].forEach(l=>{
      opts.push({key:lblToCurve(l)+'-R', html:`<span class="arrow" style="color:${COL[l]}">${l} →</span> ${l} 곡선이 <b>오른쪽</b>으로 이동한다`});
      opts.push({key:lblToCurve(l)+'-L', html:`<span class="arrow" style="color:${COL[l]}">← ${l}</span> ${l} 곡선이 <b>왼쪽</b>으로 이동한다`});
    });
    opts.push({key:'N', html:'<span class="arrow">✕</span> 곡선은 이동하지 않는다 <b>(수요량·공급량의 변화)</b>'});
  }else{
    opts=[
      {key:'D-R', html:'<span class="arrow d">D →</span> 수요 곡선이 <b>오른쪽</b>으로 이동한다'},
      {key:'D-L', html:'<span class="arrow d">← D</span> 수요 곡선이 <b>왼쪽</b>으로 이동한다'},
      {key:'S-R', html:'<span class="arrow s">S →</span> 공급 곡선이 <b>오른쪽</b>으로 이동한다'},
      {key:'S-L', html:'<span class="arrow s">← S</span> 공급 곡선이 <b>왼쪽</b>으로 이동한다'},
    ];
  }
  const box=document.getElementById('opts'); box.innerHTML='';
  shuffle(opts).forEach(o=>{
    const b=document.createElement('button'); b.className='opt'; b.innerHTML=o.html;
    b.onclick=()=>answerQ1(o.key, b); box.appendChild(b);
  });
}

function answerQ1(key, btn){
  const correctKey = cur.curve==='N' ? 'N' : cur.curve+'-'+cur.dir;
  const ok = key===correctKey;
  sok = ok;
  document.querySelectorAll('.opt').forEach(b=>b.disabled=true);
  btn.classList.add(ok?'correct':'wrong');
  if(!ok){
    document.querySelectorAll('.opt').forEach(b=>{
      const t=b.innerHTML;
      if((correctKey==='N' && t.includes('이동하지 않는다')) ||
         (correctKey!=='N' && matchOpt(t, correctKey))) b.classList.add('correct');
    });
  }
  const isTrap = cur.curve==='N';
  let gained=0;
  if(ok){ gained = isTrap ? 20 + (fok?5:0) : 10; score+=gained; }
  hud();
  const fb=document.getElementById('feedback');
  fb.className='feedback show ' + (ok?'good':'miss');
  const gainedText = ok
    ? (isTrap ? `🕵️ 함정 간파! +${gained}점${fok&&gained>20?' (모두 정답 보너스 +5)':''}` : '✅ 정답! +10점')
    : '❌ 아쉬워요!';
  let identity='';
  if(window.MODE==='hard'){
    identity = `<div style="margin-bottom:6px">💡 오른쪽 아래로 내려가는 직선 <b style="color:${COL[LB.D]}">${LB.D}</b> = <b>수요 곡선</b>, 오른쪽 위로 올라가는 직선 <b style="color:${COL[LB.S]}">${LB.S}</b> = <b>공급 곡선</b>!</div>`;
  }
  fb.innerHTML = `<div class="fb-title">${gainedText}</div>${identity}${cur.why}<br><span class="factor">${cur.factor}</span>`;
  log[log.length-1].s = ok;
  animateShift();
  const nb=document.getElementById('next-btn');
  if(isTrap){ nb.textContent = (round===ROUNDS-1)?'결과 보기 ▶':'다음 문제 ▶'; }
  else{ nb.textContent='3단계로 ▶'; }
  nb.classList.add('show');
}

function matchOpt(html, key){
  const [c,d]=key.split('-');
  const dirWord = d==='R'?'오른쪽':'왼쪽';
  if(window.MODE==='hard') return html.includes(LB[c]+' 곡선') && html.includes(dirWord);
  const curveWord = c==='D'?'수요':'공급';
  return html.includes(curveWord+' 곡선') && html.includes(dirWord);
}

function animateShift(){
  if(cur.curve==='N') return; // 함정 문제: 곡선 이동 없음
  const g = document.getElementById(cur.curve==='D'?'demand-g':'supply-g');
  const ghost = document.getElementById('ghost');
  // 잔상: 원래 자리 점선 (현재 곡선 색을 그대로 사용)
  if(cur.curve==='D'){ ghost.setAttribute('x1',80); ghost.setAttribute('y1',70); ghost.setAttribute('x2',320); ghost.setAttribute('y2',250); }
  else{ ghost.setAttribute('x1',80); ghost.setAttribute('y1',250); ghost.setAttribute('x2',320); ghost.setAttribute('y2',70); }
  ghost.setAttribute('stroke', g.querySelector('line').getAttribute('stroke'));
  ghost.setAttribute('opacity','0.35');
  const {x,y,dx}=newEq(cur.curve,cur.dir);
  const label = document.getElementById(cur.curve==='D'?'d-label':'s-label');
  setTimeout(()=>{
    g.style.transform=`translateX(${dx}px)`;
    label.style.transform=`translateX(${dx}px)`;
  },250);
  // 새 균형점
  const e1=document.getElementById('e1'), e1t=document.getElementById('e1t');
  e1.setAttribute('cx',x); e1.setAttribute('cy',y);
  e1t.setAttribute('x',x+10); e1t.setAttribute('y',y-8);
  setTimeout(()=>{ e1.setAttribute('opacity','1'); e1t.setAttribute('opacity','1'); },1200);
}

/* ─── 3단계: 가격·거래량 변동 ─── */
function renderQ2(){
  phase=3;
  document.getElementById('qtitle').textContent='3단계 · 새로운 균형에서 가격과 거래량은?';
  const opts=[
    {key:'UU', html:'가격 <b style="color:var(--up)">상승 ▲</b> · 거래량 <b style="color:var(--up)">증가 ▲</b>'},
    {key:'UD', html:'가격 <b style="color:var(--up)">상승 ▲</b> · 거래량 <b style="color:var(--down)">감소 ▼</b>'},
    {key:'DU', html:'가격 <b style="color:var(--down)">하락 ▼</b> · 거래량 <b style="color:var(--up)">증가 ▲</b>'},
    {key:'DD', html:'가격 <b style="color:var(--down)">하락 ▼</b> · 거래량 <b style="color:var(--down)">감소 ▼</b>'},
  ];
  const box=document.getElementById('opts'); box.innerHTML='';
  document.getElementById('feedback').className='feedback';
  document.getElementById('next-btn').classList.remove('show');
  shuffle(opts).forEach(o=>{
    const b=document.createElement('button'); b.className='opt'; b.innerHTML=o.html;
    b.onclick=()=>answerQ2(o.key,b); box.appendChild(b);
  });
}

function q2Key(){
  if(cur.curve==='D') return cur.dir==='R' ? 'UU' : 'DD';
  return cur.dir==='R' ? 'DU' : 'UD';
}
const Q2WHY = {
  UU:'수요가 증가하면 균형점이 공급 곡선을 따라 오른쪽 위로 이동 → 가격 상승, 거래량 증가!',
  DD:'수요가 감소하면 균형점이 공급 곡선을 따라 왼쪽 아래로 이동 → 가격 하락, 거래량 감소!',
  DU:'공급이 증가하면 균형점이 수요 곡선을 따라 오른쪽 아래로 이동 → 가격 하락, 거래량 증가!',
  UD:'공급이 감소하면 균형점이 수요 곡선을 따라 왼쪽 위로 이동 → 가격 상승, 거래량 감소!',
};

function answerQ2(key, btn){
  const ck=q2Key(); const ok = key===ck;
  document.querySelectorAll('.opt').forEach(b=>b.disabled=true);
  btn.classList.add(ok?'correct':'wrong');
  if(!ok) document.querySelectorAll('.opt').forEach(b=>{ if(optKeyOf(b)===ck) b.classList.add('correct'); });
  let gained=0;
  if(ok){ gained = 10 + (fok&&sok?5:0); }
  streak = (ok&&fok&&sok) ? streak+1 : 0;
  score+=gained; hud();
  const fb=document.getElementById('feedback');
  fb.className='feedback show ' + (ok?'good':'miss');
  fb.innerHTML=`<div class="fb-title">${ok?('✅ 정답! +'+gained+'점'+(gained>10?' (세 단계 모두 정답 보너스 +5)':'')) :'❌ 아쉬워요!'}</div>${Q2WHY[ck]}`;
  log[log.length-1].p = ok;
  showResultOnGraph(ck);
  const nb=document.getElementById('next-btn');
  nb.textContent = (round===ROUNDS-1)?'결과 보기 ▶':'다음 문제 ▶';
  nb.classList.add('show');
}

function optKeyOf(b){
  const t=b.textContent;
  return (t.includes('상승')?'U':'D') + (t.includes('증가')?'U':'D');
}

function showResultOnGraph(ck){
  const {x,y}=newEq(cur.curve,cur.dir);
  const set=(id,attrs)=>{const el=document.getElementById(id); for(const k in attrs) el.setAttribute(k,attrs[k]);};
  set('g-p0h',{x1:55,y1:160,x2:200,y2:160}); set('g-q0v',{x1:200,y1:285,x2:200,y2:160});
  set('g-p1h',{x1:55,y1:y,x2:x,y2:y});       set('g-q1v',{x1:x,y1:285,x2:x,y2:y});
  set('g-p0t',{x:50,y:164}); set('g-p1t',{x:50,y:y+4});
  set('g-q0t',{x:200,y:302}); set('g-q1t',{x:x,y:302});
  document.getElementById('guides').setAttribute('opacity','1');
  const bp=document.getElementById('badge-p'), bq=document.getElementById('badge-q');
  bp.textContent = ck[0]==='U'?'가격 상승 ▲':'가격 하락 ▼';
  bp.className = 'badge ' + (ck[0]==='U'?'up':'down');
  bq.textContent = ck[1]==='U'?'거래량 증가 ▲':'거래량 감소 ▼';
  bq.className = 'badge ' + (ck[1]==='U'?'up':'down');
  document.getElementById('badges').classList.add('show');
}

function nextStep(){
  if(phase===1){ renderQ1(); return; }                       // 1단계 → 2단계(곡선 이동)
  if(phase===2 && cur.curve!=='N'){ renderQ2(); return; }    // 2단계 → 3단계(가격·거래량)
  if(phase===2 && cur.curve==='N'){ streak = (fok&&sok)? streak+1 : 0; } // 함정 문제는 2단계에서 종료
  round++;
  if(round>=ROUNDS){ endGame(); return; }
  loadRound();
}

function endGame(){
  document.getElementById('scr-game').classList.remove('active');
  document.getElementById('scr-end').classList.add('active');
  document.getElementById('final-score').textContent=score;
  let title,msg;
  if(score>=420){ title='👑 시장의 달인'; msg='요인 분석부터 가격 예측까지 완벽해요. 시험도 문제없겠어요!'; }
  else if(score>=315){ title='🏅 유능한 시장 분석가'; msg='핵심 원리를 잘 이해하고 있어요. 틀린 단계만 한 번 더 확인해 봐요.'; }
  else if(score>=210){ title='📊 성장하는 상인'; msg='감을 잡아가는 중! 변동 요인과 곡선의 연결을 연습해 봅시다.'; }
  else{ title='🌱 견습 상인'; msg='괜찮아요, 지금부터가 시작! 아래 오답을 보고 다시 도전해 봐요.'; }
  document.getElementById('final-title').textContent=title;
  document.getElementById('final-msg').textContent=msg;
  const rv=document.getElementById('review');
  const mark=(v,label)=> v===undefined ? '' : (v?`<span class="ok">${label} ○</span>`:`<span class="no">${label} ✕</span>`);
  rv.innerHTML = log.map(l=>
    `<div class="rv">${l.round}. [${l.market}] ${mark(l.f,'①요인')}${mark(l.s,'②이동')}${mark(l.p,'③가격')}</div>`
  ).join('');
}
</script>
